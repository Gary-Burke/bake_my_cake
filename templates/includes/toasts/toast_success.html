<div class="toast border-light-subtle w-100" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="toast-header bg-success-subtle text-success-emphasis">
        <strong class="me-auto">Success!</strong>
        <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
    <div class="toast-body text-dark">
        {{ message| safe}}
    </div>
</div>
