{% extends "base.html" %}
{% load static %}

{% block content %}
<section class="container text-center">

    <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 row-cols-xl-4 g-2 g-lg-3">
        {% for cake in cakes_list %}
        <div class="col">
            <div class="p-3 cake-card">
                {% if cake.image_url %}
                <img src="{{ cake.image_url }}" alt="{{ cake.name }}">

                {% elif cake.image %}
                <img src="{% static 'images/' %}{{ cake.image }}" alt="{{ cake.name }}">

                {% else %}
                <img src="{% static 'images/placeholder.webp' %}" alt="No image available">

                {% endif %}

                <div class="row justify-content-between">
                    <p class="col-8 lead">{{ cake.name }}</p>
                    <p class="col-4 lead">{{ cake.base_price }}€</p>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

</section>

{% endblock %}
