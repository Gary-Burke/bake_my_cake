{% load static %}
<div class="row mt-2 mb-5 justify-content-center">

    {% for product in products_list %}
    <div class="product-card-admin col-10 col-md-6 col-lg-4 col-xl-3 d-flex p-3 justify-content-start border border-secondary-subtle"
        data-product-id="{{ product.id }}">

        <div class="col-6 col-lg-7">
            {% if product.image_url %}
            <img src="{{ product.image_url.url }}" alt="{{ product.name }}">
            {% elif product.image %}
            <img src="{% static 'images/' %}{{ product.image }}" alt="{{ product.name }}">
            {% else %}
            <img src="{% static 'images/placeholder.webp' %}" alt="No image available">
            {% endif %}
        </div>

        <div class="col-6 col-lg-5">
            <ul class="list-unstyled text-start ms-3 ms-md-1 ms-lg-2">
                <li><strong>{{ product.name }}</strong></li>
                <li>{{ product.base_price }}€</li>
                <li class="admin-icons mt-2">
                    <a class="button-edit" href="{% url 'edit_product' product.id %}"><i
                            class="fa-solid fa-pencil"></i></a>
                    <a class="button-delete ms-3" href="#"><i class="fa-solid fa-trash-can"></i></a>
                </li>
            </ul>
        </div>
    </div>
    {% empty %}
    <p>Currently no products listed that matches your criteria.</p>
    {% endfor %}
</div>
