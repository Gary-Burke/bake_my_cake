{% load static %}
<div class="row mt-2 mb-5 justify-content-center">

    {% for product in products_list %}
    <div class="product-card-admin col-11 col-md-6 col-lg-4 col-xl-3 d-flex p-3" data-product-id="{{ product.id }}">

        {% if product.image_url %}
        <img src="{{ product.image_url.url }}" alt="{{ product.name }}">
        {% elif product.image %}
        <img src="{% static 'images/' %}{{ product.image }}" alt="{{ product.name }}">
        {% else %}
        <img src="{% static 'images/placeholder.webp' %}" alt="No image available">
        {% endif %}

        <ul class="list-unstyled text-start ms-3 mt-3">
            <li><strong>{{ product.name }}</strong></li>
            <li>{{ product.base_price }}€</li>
        </ul>
    </div>

    {% endfor %}
</div>
