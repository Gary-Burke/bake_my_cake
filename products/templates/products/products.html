{% extends "base.html" %}
{% load static %}

{% block content %}
<section class="container text-center">

    <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 row-cols-xl-4 g-2 g-lg-3">
        {% for product in products_list %}
        <div class="col">
            <div class="p-3 product-card">
                {% if product.image_url %}
                <img src="{{ product.image_url }}" alt="{{ product.name }}">

                {% elif product.image %}
                <img src="{% static 'images/' %}{{ product.image }}" alt="{{ product.name }}">

                {% else %}
                <img src="{% static 'images/placeholder.webp' %}" alt="No image available">

                {% endif %}

                <div class="row justify-content-between">
                    <p class="col-8 lead">{{ product.name }}</p>
                    <p class="col-4 lead">{{ product.base_price }}€</p>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

</section>

{% endblock %}
